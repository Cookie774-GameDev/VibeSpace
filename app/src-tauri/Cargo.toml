[package]
name = "jarvis"
version = "0.1.36"
description = "The AI workspace where every model, agent, voice, and task lives under one persistent memory and one always-available assistant."
authors = ["Jarvis"]
edition = "2021"
rust-version = "1.78"

# We compile to a library so mobile platforms can link the entry point through
# their platform frameworks. Desktop binaries also link this lib via main.rs.
[lib]
name = "jarvis_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-notification = "2"
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tauri-plugin-os = "2"
tauri-plugin-http = "2"
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
tauri-plugin-single-instance = "2"
keyring = { version = "3.6.3", default-features = false, features = ["apple-native", "windows-native", "linux-native-sync-persistent", "crypto-rust"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
sha2 = "0.10"

# PTY terminal backend (slice 1 of Wave 4 â€” multi-pane terminal grid).
# `portable-pty` gives us a single API across ConPTY (Windows 10 1809+) and
# the Unix forkpty path; `nanoid` is used for short opaque session ids.
portable-pty = "0.8"
nanoid = "0.4"
ort = { version = "2.0.0-rc.9", features = ["ndarray"], optional = true }
misaki-rs = { version = "0.3.0", default-features = false, optional = true }
hound = { version = "3.5.1", optional = true }
ndarray = { version = "0.16", optional = true }
ndarray-npy = { version = "0.9.1", default-features = false, features = ["npz", "compressed_npz"], optional = true }
base64 = { version = "0.22", optional = true }

[target.'cfg(windows)'.dependencies]
winreg = "0.52"

# Default development profile â€“ optimise compile times.
[profile.dev]
incremental = true

# Production profile â€“ Tauri's recommended settings for smaller, faster bundles.
#
# We use `thin` LTO and 4 codegen-units instead of `lto=true` + `codegen-units=1`
# because:
#   - Thin LTO gives us the bulk of the size/perf wins (Chromium and Firefox
#     ship thin LTO releases) at a fraction of the peak memory cost.
#   - `codegen-units = 1` was forcing rustc to hold the entire `tauri` crate's
#     IR in memory during optimization (>4 GB peak), which overflows on machines
#     with constrained RAM during the link step. 4 units parallelises the work
#     and keeps each unit's footprint manageable while still letting LTO span
#     them at the end.
# The resulting binary is typically within 1-3% of the size you'd get from
# full LTO with codegen-units=1, and noticeably faster to build.
[profile.release]
codegen-units = 4
lto = "thin"
opt-level = "s"
panic = "abort"
strip = true

[features]
# Real Kokoro-82M local neural TTS: ONNX Runtime (`ort`) + pure-Rust misaki G2P.
# OFF by default so the stable build is byte-for-byte unaffected and pulls none
# of these native deps. The release build opts in with `--features kokoro`.
# When the feature is off, `kokoro_speak` returns `engine_not_available` and the
# app falls back to the Windows Natural voice — never a crash.
kokoro = ["dep:ort", "dep:misaki-rs", "dep:hound", "dep:ndarray", "dep:ndarray-npy", "dep:base64"]
